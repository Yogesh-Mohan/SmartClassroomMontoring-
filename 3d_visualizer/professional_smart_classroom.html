<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Smart Classroom - 3D Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 30px; left: 30px; padding: 25px;
            background: rgba(255, 255, 255, 0.95); border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-left: 6px solid #2980b9;
            max-width: 300px;
        }
        h1 { margin: 0; font-size: 1.2rem; color: #2c3e50; letter-spacing: 1px; }
        p { margin: 10px 0; font-size: 0.85rem; color: #7f8c8d; line-height: 1.6; }
        .btn {
            background: #2980b9; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s; margin-top: 15px; text-transform: uppercase;
        }
        .btn:hover { background: #3498db; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SMART CLASSROOM</h1>
        <p><b>Live Monitoring Environment</b><br>Professional 3D Prototype illustrating the real-time device ecosystem.</p>
        <button class="btn" onclick="triggerAlert()">Simulate Detection</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4f8);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 18, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- LIGHTING ---
        const amb = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // --- MATERIALS ---
        const floorTex = new THREE.MeshPhysicalMaterial({ color: 0xd2b48c, roughness: 0.4, metalness: 0.1 });
        const wallTex = new THREE.MeshPhysicalMaterial({ color: 0xfdfdfd, roughness: 0.8 });
        const deskTex = new THREE.MeshPhysicalMaterial({ color: 0x4a3728, roughness: 0.4 });
        const chairTex = new THREE.MeshPhysicalMaterial({ color: 0x34495e, roughness: 0.7 });

        // --- CLASSROOM STRUCTURE ---
        const floor = new THREE.Mesh(new THREE.BoxGeometry(35, 0.5, 30), floorTex);
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(new THREE.BoxGeometry(35, 15, 0.5), wallTex);
        backWall.position.set(0, 7.5, -15);
        scene.add(backWall);

        const sideWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 15, 30), wallTex);
        sideWall.position.set(-17.5, 7.5, 0);
        scene.add(sideWall);

        // Board
        const board = new THREE.Mesh(new THREE.PlaneGeometry(12, 6.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        board.position.set(0, 8, -14.7);
        scene.add(board);

        // --- DESKS & STUDENTS ---
        const characters = [];
        function createDesk(x, z, id, isAlerted) {
            const group = new THREE.Group();

            // Desk
            const desk = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.2, 2.5), deskTex);
            desk.position.y = 3.5;
            desk.castShadow = true;
            group.add(desk);
            const legs = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3.5, 2.3), chairTex);
            legs.position.set(2, 1.75, 0); group.add(legs);
            const legs2 = legs.clone(); legs2.position.x = -2; group.add(legs2);

            // Chair
            const chair = new THREE.Group();
            const seat = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2), chairTex);
            seat.position.y = 2.2;
            chair.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 0.2), chairTex);
            back.position.set(0, 3.5, 1);
            chair.add(back);
            chair.position.z = 1.5;
            group.add(chair);

            // Student (Character)
            const person = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 1.5), new THREE.MeshStandardMaterial({ color: 0x3498db }));
            person.add(torso);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 1.1;
            person.add(head);
            person.position.set(0, 3.2, 1.5);
            group.add(person);

            // Detection Ring (Hidden by default)
            const ring = new THREE.Mesh(new THREE.TorusGeometry(3.5, 0.1, 16, 100), new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0 }));
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.2;
            group.add(ring);
            group.ring = ring;

            if(isAlerted) {
                head.rotation.x = 0.6; // Looking down at phone
                group.isViolator = true;
            }

            group.position.set(x, 0, z);
            scene.add(group);
            characters.push({ group, head, person, ring, seed: Math.random()*10 });
        }

        for(let r=0; r<2; r++) for(let c=0; c<4; c++) createDesk(c*8 - 12, r*10 - 5, c*r, r==1 && c==1);

        // --- HOLOGRAPHIC CLOUD ---
        const cloud = new THREE.Mesh(new THREE.TorusKnotGeometry(1.5, 0.4, 100, 16), new THREE.MeshPhysicalMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2, transmission: 1 }));
        cloud.position.set(-10, 12, -5);
        scene.add(cloud);

        // --- ACTION ---
        window.triggerAlert = function() {
            characters.forEach(c => {
                if(c.group.isViolator) {
                    c.ring.material.opacity = 1;
                    const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 40), new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.3 }));
                    beam.position.y = 20;
                    c.group.add(beam);
                    setTimeout(() => { c.ring.material.opacity = 0; beam.visible = false; }, 5000);
                }
            });
        };

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            characters.forEach(c => {
                c.person.position.y = 3.2 + Math.sin(t * 2 + c.seed) * 0.04; // Breathe
                c.head.rotation.y = Math.sin(t * 0.5 + c.seed) * 0.2; // Look
                if(c.ring.material.opacity > 0) {
                    c.ring.scale.setScalar(1 + Math.sin(t * 5) * 0.05);
                }
            });

            cloud.rotation.y += 0.01;
            cloud.rotation.z += 0.005;
            cloud.position.y = 12 + Math.sin(t) * 0.5;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
